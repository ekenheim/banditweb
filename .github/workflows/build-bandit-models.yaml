---
# .github/workflows/build-bandit-models.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Uploads bandit model code to MinIO S3 on:
#   - push to main (changes under models/)
#   - pull_request targeting main (validate only, no upload)
#   - manual dispatch (workflow_dispatch)
#
# Each policy is uploaded as a self-contained directory:
#   s3://bandit-models/<policy>/model.py
#   s3://bandit-models/<policy>/model-settings.json
#
# Secrets required (set in repo Settings → Secrets):
#   MINIO_ENDPOINT    — e.g. https://s3.yourdomain.com
#   MINIO_ACCESS_KEY  — MinIO access key
#   MINIO_SECRET_KEY  — MinIO secret key
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Bandit Models to S3

on:
  push:
    branches: [main]
    paths:
      - "models/**"
      - ".github/workflows/build-bandit-models.yaml"
  pull_request:
    branches: [main]
    paths:
      - "models/**"
  workflow_dispatch:
    inputs:
      policy:
        description: "Single policy to deploy (leave empty for all)"
        required: false
        default: ""
      upload:
        description: "Upload to S3?"
        type: boolean
        default: true

env:
  S3_BUCKET: bandit-models

jobs:
  # ── Determine which policies changed ───────────────────────────────────────
  changes:
    runs-on: gha-runner-scale-set-banditweb
    outputs:
      policies: ${{ steps.filter.outputs.policies }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine changed policies
        id: filter
        run: |
          if [ -n "${{ github.event.inputs.policy }}" ]; then
            echo "policies=[\"${{ github.event.inputs.policy }}\"]" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^models/' \
              | cut -d/ -f2 \
              | grep -v '^_' \
              | grep -v '^requirements' \
              | grep -v '^Dockerfile' \
              | sort -u \
              | jq -R . | jq -sc .)

            if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
              echo 'policies=["epsilon_greedy","ucb","thompson_sampling","linucb","bayesian_ucb","exp3","lints"]' >> "$GITHUB_OUTPUT"
            else
              echo "policies=$CHANGED" >> "$GITHUB_OUTPUT"
            fi
          fi

  # ── Validate & upload ────────────────────────────────────────────────────
  deploy:
    needs: changes
    runs-on: gha-runner-scale-set-banditweb
    strategy:
      fail-fast: false
      matrix:
        policy: ${{ fromJson(needs.changes.outputs.policies) }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate model files exist
        run: |
          if [ ! -f "models/${{ matrix.policy }}/model.py" ]; then
            echo "::error::Missing models/${{ matrix.policy }}/model.py"
            exit 1
          fi
          if [ ! -f "models/${{ matrix.policy }}/model-settings.json" ]; then
            echo "::error::Missing models/${{ matrix.policy }}/model-settings.json"
            exit 1
          fi
          echo "Validated: models/${{ matrix.policy }}/"

      - name: Validate Python syntax
        run: python3 -c "import py_compile; py_compile.compile('models/${{ matrix.policy }}/model.py', doraise=True)"

      - name: Install MinIO client
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
          chmod +x "$HOME/.local/bin/mc"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Upload to S3
        if: github.event_name != 'pull_request'
        run: |
          mc alias set minio "${{ secrets.MINIO_ENDPOINT }}" "${{ secrets.MINIO_ACCESS_KEY }}" "${{ secrets.MINIO_SECRET_KEY }}"
          mc mb --ignore-existing "minio/${{ env.S3_BUCKET }}"
          mc cp "models/${{ matrix.policy }}/model.py" "minio/${{ env.S3_BUCKET }}/${{ matrix.policy }}/model.py"
          mc cp "models/${{ matrix.policy }}/model-settings.json" "minio/${{ env.S3_BUCKET }}/${{ matrix.policy }}/model-settings.json"

      - name: Output summary
        run: |
          echo "### Model deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "**Policy:** \`${{ matrix.policy }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Destination:** \`s3://${{ env.S3_BUCKET }}/${{ matrix.policy }}/\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Trigger Flux reconciliation ────────────────────────────────────────────
  flux-reconcile:
    needs: deploy
    runs-on: gha-runner-scale-set-banditweb
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Reconcile Flux kustomization
        uses: fluxcd/flux2/action@main
        with:
          version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          flux reconcile kustomization bandit-demo \
            --with-source \
            --timeout=5m \
            --namespace=flux-system \
          || echo "flux CLI not configured — Flux will auto-reconcile within poll interval"
