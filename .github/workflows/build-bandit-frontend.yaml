---
# .github/workflows/build-bandit-frontend.yaml
name: Build Bandit Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/build-bandit-frontend.yaml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  IMAGE: banditweb/bandit-frontend

jobs:
  build:
    runs-on: gha-runner-scale-set-banditweb
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_MLFLOW_URL=${{ secrets.MLFLOW_URL }} \
            --build-arg VITE_SIMULATE=false \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
            ./frontend

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
